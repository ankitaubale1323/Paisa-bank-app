name: CICD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/nexbank-backend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/nexbank-backend:${{ github.sha }} \
            -f backend/Dockerfile \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/nexbank-frontend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/nexbank-frontend:${{ github.sha }} \
            -f frontend/Dockerfile \
            ./frontend

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nexbank-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/nexbank-backend:${{ github.sha }}

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nexbank-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/nexbank-frontend:${{ github.sha }}
