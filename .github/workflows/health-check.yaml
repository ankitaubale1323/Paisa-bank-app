name: Health Check

on:
  schedule:
    - cron: 0 */5 * * * *   # Every 12 hours
  workflow_dispatch:          # Manual trigger for testing

jobs:
  health-check:
    name: Container Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull latest Paisa Bank image
        run: |
          echo "📥 Pulling latest image..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/paisa-bank-app:latest

      - name: Run container in detached mode
        run: |
          docker run -d \
            --name paisa-bank-health \
            -p 5000:5000 \
            -e NODE_ENV=production \
            ${{ secrets.DOCKER_USERNAME }}/paisa-bank-app:latest
          echo "Container started."

      - name: Wait for container to be ready
        run: |
          echo "⏳ Waiting 5 seconds for app to initialise..."
          sleep 5

      - name: Health check – curl the endpoint
        id: health
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || echo "000")
          echo "http_status=$HTTP_STATUS" >> $GITHUB_OUTPUT

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check PASSED (HTTP $HTTP_STATUS)"
            echo "health_status=PASSED" >> $GITHUB_OUTPUT
          else
            echo "❌ Health check FAILED (HTTP $HTTP_STATUS)"
            echo "health_status=FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Stop and remove container
        if: always()
        run: |
          docker stop paisa-bank-health || true
          docker rm paisa-bank-health   || true
          echo "🧹 Container cleaned up."

      - name: Write health check summary
        if: always()
        run: |
          echo "## 🏦 Paisa Bank – Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ secrets.DOCKER_USERNAME }}/paisa-bank-app:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| HTTP Status | \`${{ steps.health.outputs.http_status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ steps.health.outputs.health_status == 'PASSED' && '✅ PASSED' || '❌ FAILED' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Schedule | Every 12 hours |" >> $GITHUB_STEP_SUMMARY

      - name: Fail job if health check failed
        if: steps.health.outputs.health_status == 'FAILED'
        run: |
          echo "Health check failed — investigation required."
          exit 1