name: Reusable – Build & Test

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version to use"
        type: string
        default: "20"
      run_tests:
        description: "Whether to run tests"
        type: boolean
        default: true
    outputs:
      test_result:
        description: "Result of the test run: passed or failed"
        value: ${{ jobs.build-test.outputs.test_result }}

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.set-result.outputs.test_result }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # ── Backend ──────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        if: ${{ inputs.run_tests }}
        working-directory: backend
        run: npm test
        # Paisa Bank uses Jest; falls back gracefully if no test script
        continue-on-error: false

      # ── Frontend ─────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build

      # ── Result output ─────────────────────────────────────────
      - name: Set test result output
        id: set-result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "test_result=passed" >> $GITHUB_OUTPUT
          else
            echo "test_result=failed" >> $GITHUB_OUTPUT
          fi