# ─────────────────────────────────────────────────────────────
# Nginx Configuration for PiasaBank Frontend
# This config makes React Router work correctly in production
# ─────────────────────────────────────────────────────────────

server {
    # Listen on port 80 (standard HTTP)
    listen 80;

    # Serve files from this folder (where Vite builds to)
    root /usr/share/nginx/html;

    # Default file to serve
    index index.html;

    # Handle all routes — redirect everything to index.html
    # This is required for React Router (client-side routing)
    # Without this, refreshing /accounts would give a 404 error
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward all /api requests to the backend container
    # "backend" is the service name defined in docker-compose.yml
    location /api {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: Enable gzip compression for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}