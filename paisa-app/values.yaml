# ─────────────────────────────────────────────────────────────────────
#  NexBank Helm Chart — values.yaml
#
#  DEFAULT values for Kind (local testing on EC2).
#  Real secret values are NEVER stored here.
#
#  HOW TO PASS SECRETS:
#    helm install nexbank . \
#      --set secrets.mongoRootPassword="REAL_PASSWORD" \
#      --set secrets.jwtSecret="REAL_JWT_SECRET_32CHARS"
#
#  For EKS:
#    helm install nexbank . -f values-eks.yaml \
#      --set secrets.mongoRootPassword="REAL_PASSWORD" \
#      --set secrets.jwtSecret="REAL_JWT_SECRET_32CHARS"
# ─────────────────────────────────────────────────────────────────────

# ── Global ───────────────────────────────────────────────────
global:
  namespace: nexbank

# ── Secrets (NEVER put real values here) ─────────────────────
# These placeholders make helm lint pass
# Always override at install time with --set
secrets:
  create: true
  mongoRootUsername: "admin"
  mongoRootPassword: "CHANGEME"
  jwtSecret: "CHANGEME_MIN_32_CHARACTERS_LONG"

# ── Frontend ─────────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: ankitaubale/frontend-paisa-app
    tag: latest
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 80

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# ── Backend ──────────────────────────────────────────────────
backend:
  enabled: true
  replicaCount: 1

  image:
    repository: ankitaubale/backend-paisa-app
    tag: latest
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 5000

  config:
    port: "5000"
    nodeEnv: "production"
    ollamaModel: "llama3.2"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# ── MongoDB StatefulSet ───────────────────────────────────────
# StatefulSet gives:
#   - Stable pod name:  mongodb-0
#   - Stable DNS:       mongodb-0.mongodb-headless.nexbank.svc.cluster.local
#   - Per-pod PVC:      mongodb-data-mongodb-0 (auto-created by volumeClaimTemplates)
mongodb:
  enabled: true
  replicaCount: 1

  image:
    repository: mongo
    tag: "7"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 27017

  database: bankapp_db

  # false = emptyDir (Kind — data lost on restart, fine for testing)
  # true  = EBS PVC  (EKS — data persists, use in production)
  persistence:
    enabled: false
    storageClass: "nexbank-ebs"
    size: 10Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# ── Ollama StatefulSet ────────────────────────────────────────
# StatefulSet keeps downloaded AI models across restarts
# Without persistence, llama3.2 (2GB) re-downloads on every restart
ollama:
  enabled: true
  replicaCount: 1

  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 11434

  model: llama3.2

  # false = emptyDir (Kind)
  # true  = EBS PVC  (EKS)
  persistence:
    enabled: false
    storageClass: "nexbank-ebs"
    size: 20Gi

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

# ── Ingress ───────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
